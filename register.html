<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaxWiki - Crear cuenta</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="stars" id="stars"></div>

    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i>
        Volver al inicio
    </a>

    <div class="register-container">
        <div class="register-card">
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1 class="logo-text">Crear cuenta</h1>
                <p class="logo-subtitle">ÚNETE A GALAXWIKI</p>
            </div>

            <div class="alert alert-error" id="errorAlert"></div>
            <div class="alert alert-success" id="successAlert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Usuario</label>
                    <div class="input-group-custom">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-control" id="username" placeholder="Nombre de usuario" required minlength="3" autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Correo electrónico</label>
                    <div class="input-group-custom">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-control" id="email" placeholder="tu@email.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Nombre de flota <span style="color: var(--text-tertiary); font-weight: normal;">(opcional)</span></label>
                    <div class="input-group-custom">
                        <i class="fas fa-flag input-icon"></i>
                        <input type="text" class="form-control" id="fleet" placeholder="Ej: Flota Alpha">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group-custom">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="password" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirmar contraseña</label>
                    <div class="input-group-custom">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Repite tu contraseña" required autocomplete="new-password">
                    </div>
                </div>

                <button type="submit" class="btn-register" id="registerBtn">
                    <i class="fas fa-rocket me-2"></i>Crear cuenta
                </button>

                <p class="auth-note">
                    La primera cuenta tendrá permisos de <strong>administrador</strong>. El resto serán usuarios normales.
                </p>
                <div class="auth-footer">
                    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-firestore-compat.min.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        const auth = window.auth;
        const db = window.db;

        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        function showError(message) {
            const el = document.getElementById('errorAlert');
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        function showSuccess(message) {
            document.getElementById('successAlert').textContent = message;
            document.getElementById('successAlert').style.display = 'block';
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('registerBtn');
            btn.disabled = isLoading;
            btn.innerHTML = isLoading ? '<span class="loading-spinner"></span> Creando cuenta...' : '<i class="fas fa-rocket me-2"></i>Crear cuenta';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const fleet = document.getElementById('fleet').value.trim() || 'Sin Flota';
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showError('Las contraseñas no coinciden');
                return;
            }
            if (password.length < 6) {
                showError('La contraseña debe tener al menos 6 caracteres');
                return;
            }

            setLoading(true);
            try {
                const usernameQuery = await db.collection('users').where('username', '==', username).get();
                if (!usernameQuery.empty) {
                    setLoading(false);
                    showError('Este nombre de usuario ya está en uso');
                    return;
                }

                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                const usersSnapshot = await db.collection('users').get();
                const isFirstUser = usersSnapshot.empty;

                await db.collection('users').doc(user.uid).set({
                    username,
                    email,
                    fleet,
                    role: isFirstUser ? 'admin' : 'user',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    avatar: null
                });

                showSuccess(isFirstUser ? '¡Cuenta de administrador creada! Redirigiendo...' : '¡Cuenta creada! Redirigiendo...');
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            } catch (error) {
                setLoading(false);
                const messages = {
                    'auth/email-already-in-use': 'Este correo ya está registrado',
                    'auth/invalid-email': 'Correo electrónico inválido',
                    'auth/weak-password': 'La contraseña es muy débil',
                    'auth/operation-not-allowed': 'Registro deshabilitado temporalmente'
                };
                showError(messages[error.code] || error.message);
            }
        });

        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
