<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaxWiki - Noticia</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../css/styles.css" rel="stylesheet">
    <!-- Editor de texto rico Quill.js (CDN gratuito, sin Storage) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
    <style>
        .btn-reaction {
            transition: transform 0.18s ease, box-shadow 0.2s ease;
            border-radius: 20px; padding: 6px 13px; font-size: 1.1em; cursor: pointer;
            background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary);
            display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-reaction:hover { transform: scale(1.08); background: rgba(102,126,234,0.1); }
        .btn-reaction.reaction-selected { box-shadow: 0 0 0 2px var(--accent); background: rgba(102,126,234,0.12); }
        .btn-reaction.reaction-pop { animation: rPop 0.3s ease; }
        @keyframes rPop { 0%{transform:scale(1);} 50%{transform:scale(1.3);} 100%{transform:scale(1);} }
        .news-image { width:100%; max-height:420px; object-fit:cover; border-radius:14px; margin-bottom:22px; }
        .news-content { line-height:1.8; color:var(--text-secondary); font-size:15px; }
        .news-content img { max-width:100%; border-radius:10px; margin:12px 0; display:block; }
        .news-content a { color:var(--accent); }
        .reactions-wrap { margin:24px 0 8px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
        .reactions-label { font-size:13px; color:var(--text-tertiary); margin-right:4px; }
        .reactions-guest { font-size:12px; color:var(--text-tertiary); margin-top:6px; }
        .reactions-guest a { color:var(--accent); }

        .gw-err { color: #f87171; font-size: 13px; margin: 4px 0 0; display: none; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <a href="../index.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;">
                    <div class="logo-img"><i class="fas fa-rocket"></i></div>
                    <div class="logo-text">
                        <span class="logo-title">GalaxWiki</span>
                        <span class="logo-subtitle">PIRATE GALAXY</span>
                    </div>
                </a>
            </div>
            <div class="user-section">
                <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon theme-icon" id="themeIcon"></i></div>
                <div class="auth-buttons" id="authButtons" style="display:none;">
                    <a href="../login.html" class="btn-header btn-login"><i class="fas fa-sign-in-alt"></i> Iniciar sesion</a>
                    <a href="../register.html" class="btn-header btn-register"><i class="fas fa-user-plus"></i> Registrarse</a>
                </div>
                <!-- El dropdown es reconstruido por header-auth.js -->
                <div class="dropdown" id="userProfile" style="display:none;"></div>
            </div>
        </div>
    </header>

    <nav class="navigation">
        <div class="nav-content">
            <ul class="nav-links">
                <li class="nav-item"><a href="../index.html" class="nav-link"><i class="fas fa-home"></i> Inicio</a></li>
                <li class="nav-item"><a href="wiki/ships.html" class="nav-link"><i class="fas fa-space-shuttle"></i> Naves</a></li>
                <li class="nav-item"><a href="wiki/builds.html" class="nav-link"><i class="fas fa-tools"></i> Builds</a></li>
                <li class="nav-item"><a href="wiki/components.html" class="nav-link"><i class="fas fa-cog"></i> Componentes</a></li>
                <li class="nav-item"><a href="wiki/enemies.html" class="nav-link"><i class="fas fa-skull"></i> Enemigos</a></li>
                <li class="nav-item"><a href="wiki/systems.html" class="nav-link"><i class="fas fa-globe"></i> Sistemas</a></li>
                <li class="nav-item"><a href="wiki/missions.html" class="nav-link"><i class="fas fa-tasks"></i> Misiones</a></li>
                <li class="nav-item"><a href="wiki/misc-info.html" class="nav-link"><i class="fas fa-info-circle"></i> Misc Info</a></li>
                <li class="nav-item"><a href="wiki/calculator.html" class="nav-link"><i class="fas fa-calculator"></i> Calculadora</a></li>
                <li class="nav-item"><a href="forum.html" class="nav-link"><i class="fas fa-comments"></i> Foro</a></li>
                <li class="nav-item"><a href="news.html" class="nav-link active"><i class="fas fa-newspaper"></i> Noticias</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-container">
        <p class="mb-3">
            <a href="news.html" class="nav-link" style="display:inline-flex;align-items:center;gap:6px;">
                <i class="fas fa-arrow-left"></i> Volver a Noticias
            </a>
        </p>
        <div id="newsDetail"></div>
        <!-- Seccion de comentarios -->
        <div id="newsCommentsSection"></div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-firestore-compat.min.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
    <script src="../js/content-utils.js"></script>
    <script src="../js/header-auth.js"></script>
    <script src="../js/comments.js"></script>
    <script>
    (function() {
        'use strict';

        var EMOJIS = ['\uD83D\uDC4D','\u2764\uFE0F','\uD83D\uDE04','\uD83C\uDF89','\uD83D\uDD25','\uD83D\uDE32','\uD83D\uDE22','\uD83D\uDE02','\uD83E\uDD14','\uD83D\uDC4E','\uD83C\uDFAE'];

        // Emojis rapidos para comentarios (diferente set, mas expresivos)
        var QUICK_EMOJIS = ['\uD83D\uDE80','\uD83D\uDC80','\uD83D\uDC4D','\u2764\uFE0F','\uD83D\uDD25','\uD83E\uDD14','\uD83D\uDE02','\uD83D\uDE10','\uD83D\uDE31','\uD83D\uDC4F','\uD83C\uDFAF','\u26A1','\uD83D\uDEE0\uFE0F','\uD83D\uDC08','\uD83E\uDD86'];

        var db      = window.db;
        var auth    = window.auth;
        var params  = new URLSearchParams(location.search);
        var newsId  = params.get('id');
        var container   = document.getElementById('newsDetail');
        var commSection = document.getElementById('newsCommentsSection');
        var reactionPending = false;

        var currentUser = null;
        var currentUserData = {};
        var isAdmin = false;

        if (!newsId || !db) {
            container.innerHTML = '<div class="empty-state">Noticia no especificada. <a href="news.html">Volver</a></div>';
            return;
        }

        // ── Reacciones ─────────────────────────────────────────
        function buildReactionsHtml(reactions) {
            var html = '<div class="reactions-wrap"><span class="reactions-label"><i class="fas fa-heart me-1"></i>Reacciones:</span>';
            EMOJIS.forEach(function(emoji) {
                var count = reactions[emoji] || 0;
                html += '<button type="button" class="btn-reaction" data-emoji="'+emoji+'">'+emoji+' <span class="rc">'+count+'</span></button>';
            });
            html += '</div><p class="reactions-guest" id="reactGuestNote" style="display:none;"><i class="fas fa-lock me-1"></i><a href="../login.html">Inicia sesion</a> para reaccionar.</p>';
            return html;
        }

        async function markUserReaction() {
            if (!auth || !auth.currentUser) {
                var note = document.getElementById('reactGuestNote');
                if (note) note.style.display='block'; return;
            }
            try {
                var snap = await db.collection('news').doc(newsId).collection('user_reactions').doc(auth.currentUser.uid).get();
                var active = snap.exists ? (snap.data().emoji||'') : '';
                document.querySelectorAll('.btn-reaction').forEach(function(b) {
                    b.classList.toggle('reaction-selected', b.getAttribute('data-emoji')===active);
                });
            } catch(_) {}
        }

        async function toggleReaction(emoji) {
            if (!auth||!auth.currentUser) { document.getElementById('reactGuestNote').style.display='block'; return; }
            if (reactionPending) return;
            reactionPending = true;
            var allBtns = document.querySelectorAll('.btn-reaction');
            allBtns.forEach(function(b){b.disabled=true;});
            var uid=auth.currentUser.uid, uRef=db.collection('news').doc(newsId).collection('user_reactions').doc(uid), newsRef=db.collection('news').doc(newsId);
            try {
                var uSnap=await uRef.get(), prev=uSnap.exists?(uSnap.data().emoji||''):'';
                var nSnap=await newsRef.get(), reacts=Object.assign({},nSnap.data().reactions||{});
                if (prev===emoji) { reacts[emoji]=Math.max(0,(reacts[emoji]||0)-1); await uRef.delete(); }
                else { if(prev) reacts[prev]=Math.max(0,(reacts[prev]||0)-1); reacts[emoji]=(reacts[emoji]||0)+1; await uRef.set({emoji:emoji}); }
                await newsRef.update({reactions:reacts});
                var active=(prev===emoji)?'':emoji;
                allBtns.forEach(function(b){
                    var e=b.getAttribute('data-emoji'); b.querySelector('.rc').textContent=reacts[e]||0;
                    b.classList.toggle('reaction-selected',e===active);
                });
            } catch(e){console.error('Reaction:',e);}
            finally { reactionPending=false; setTimeout(function(){allBtns.forEach(function(b){b.disabled=false;});},600); }
        }

        function initComments() {
            if (window.GWComments) {
                window.GWComments.init({
                    collection: 'news',
                    docId: newsId,
                    containerId: 'newsCommentsSection'
                });
            }
        }

        // ── Cargar noticia ─────────────────────────────────────
        async function load() {
            container.innerHTML='<div class="empty-state"><i class="fas fa-spinner fa-spin me-2"></i>Cargando...</div>';
            try {
                var doc=await db.collection('news').doc(newsId).get();
                if (!doc.exists){container.innerHTML='<div class="empty-state">Noticia no encontrada. <a href="news.html">Volver</a></div>';return;}
                var n=doc.data();
                if(n.published===false){container.innerHTML='<div class="empty-state">Esta noticia no esta publicada. <a href="news.html">Volver</a></div>';return;}
                document.title='GalaxWiki - '+(n.title||'Noticia');
                var dateStr=n.createdAt&&n.createdAt.toDate?n.createdAt.toDate().toLocaleDateString('es',{day:'2-digit',month:'long',year:'numeric'}):'';
                var contentHtml=(n.content||'').trim();
                if(contentHtml&&!contentHtml.startsWith('<')){
                    contentHtml='<div style="white-space:pre-wrap;">'+(typeof formatContentWithImages==='function'?formatContentWithImages(contentHtml):contentHtml.replace(/</g,'&lt;').replace(/>/g,'&gt;'))+'</div>';
                }
                var reactions=(n.reactions&&typeof n.reactions==='object')?n.reactions:{};
                container.innerHTML='<article class="profile-card" style="text-align:left;">'
                    +(n.image?'<img class="news-image" src="'+n.image.replace(/"/g,'&quot;')+'" alt="">':'')
                    +'<h1 class="page-title">'+(n.title||'Sin titulo').replace(/</g,'&lt;')+'</h1>'
                    +'<p class="profile-meta" style="margin-bottom:20px;">'+(n.authorName?'Por <strong>'+n.authorName.replace(/</g,'&lt;')+'</strong>':'')+(dateStr?' &middot; '+dateStr:'')+'</p>'
                    +'<div class="news-content">'+(contentHtml||'')+'</div>'
                    +buildReactionsHtml(reactions)
                    +'</article>';

                document.querySelectorAll('.btn-reaction').forEach(function(btn){
                    btn.addEventListener('click',function(){
                        var e=this.getAttribute('data-emoji');
                        this.classList.add('reaction-pop'); var self=this;
                        setTimeout(function(){self.classList.remove('reaction-pop');},300);
                        toggleReaction(e);
                    });
                });

                markUserReaction();

                // Inicializar sistema de comentarios global
                initComments();

            } catch(e) {
                console.error(e);
                container.innerHTML='<div class="empty-state">Error al cargar la noticia. <a href="news.html">Volver</a></div>';
            }
        }

        if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',load);
        else load();

    })();
    </script>
</body>
</html>
