<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaxWiki - Editor de Builds</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../../css/styles.css" rel="stylesheet">
    <script src="../../js/components/footer-component.js"></script>
    <style>
        .editor-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .slot-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }
        .slot-num {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg,#667eea,#764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .slot-select {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 13px;
        }
        .slot-select:focus { border-color: var(--accent); outline: none; }
        .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .ship-preview {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(102,126,234,0.08),rgba(118,75,162,0.08));
            border: 1px solid rgba(102,126,234,0.2);
            border-radius: 14px;
        }
        .ship-preview img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
        }
        .ship-preview-placeholder {
            width: 64px;
            height: 64px;
            background: rgba(102,126,234,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #667eea;
        }
        .read-only-badge {
            background: rgba(148,163,184,0.15);
            color: #94a3b8;
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .like-btn {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #f87171;
            border-radius: 10px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.25s;
        }
        .like-btn:hover { background: rgba(239,68,68,0.2); }
        .like-btn.liked { background: rgba(239,68,68,0.25); border-color: #f87171; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <a href="../../index.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;">
                    <div class="logo-img"><i class="fas fa-rocket"></i></div>
                    <div class="logo-text">
                        <span class="logo-title">GalaxWiki</span>
                        <span class="logo-subtitle">PIRATE GALAXY</span>
                    </div>
                </a>
            </div>
            <div class="user-section">
                <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon theme-icon" id="themeIcon"></i></div>
                <div class="auth-buttons" id="authButtons" style="display:none;">
                    <a href="../../login.html" class="btn-header btn-login"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</a>
                </div>
                <div class="user-profile" id="userProfile" style="display:none;">
                    <div class="user-avatar" id="userAvatar"><i class="fas fa-user"></i></div>
                    <div class="user-info"><div class="user-name" id="userName">Usuario</div></div>
                    <button class="btn-header btn-login" onclick="firebase.auth().signOut()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </div>
        <nav class="nav-menu">
            <a href="../../index.html" class="nav-link"><i class="fas fa-home me-1"></i>Inicio</a>
            <a href="ships.html" class="nav-link"><i class="fas fa-space-shuttle me-1"></i>Naves</a>
            <a href="builds.html" class="nav-link"><i class="fas fa-tools me-1"></i>Builds</a>
        </nav>
    </header>

    <main class="main-content" style="padding: 30px 20px; max-width: 900px; margin: 0 auto;">
        <!-- Header -->
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:24px; flex-wrap: wrap;">
            <a href="builds.html" style="color:var(--text-secondary); text-decoration:none; font-size:14px;"><i class="fas fa-arrow-left me-1"></i>Volver a Builds</a>
            <h1 id="editorTitle" style="font-size:24px; font-weight:800; background:linear-gradient(135deg,#667eea,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0;"></h1>
            <span id="readOnlyBadge" class="read-only-badge" style="display:none;">Solo lectura</span>
        </div>

        <div id="authGate" style="display:none; text-align:center; padding:40px; background:var(--bg-card); border-radius:16px; border:1px solid var(--border-color);">
            <i class="fas fa-lock" style="font-size:40px; color:#667eea; margin-bottom:16px;"></i>
            <p style="color:var(--text-secondary);">Debes iniciar sesión para crear builds.</p>
            <a href="../../login.html" class="btn-create-build" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;padding:12px 24px;text-decoration:none;font-weight:700;">Iniciar sesión</a>
        </div>

        <div id="editorContent">
            <div class="editor-card">
                <h3 style="font-size:16px; font-weight:700; color:var(--text-primary); margin-bottom:16px;"><i class="fas fa-space-shuttle me-2" style="color:var(--accent);"></i>Selecciona una nave</h3>
                <div class="ship-preview" id="shipPreview">
                    <div class="ship-preview-placeholder"><i class="fas fa-space-shuttle"></i></div>
                    <div>
                        <div style="font-size:16px;font-weight:700;color:var(--text-primary);" id="selectedShipName">Ninguna seleccionada</div>
                        <div style="font-size:13px;color:var(--text-secondary);" id="selectedShipMeta"></div>
                    </div>
                </div>
                <select id="shipSelect" class="slot-select" style="width:100%; font-size:14px; padding:12px;">
                    <option value="">-- Selecciona una nave --</option>
                </select>
            </div>

            <div class="editor-card">
                <h3 style="font-size:16px; font-weight:700; color:var(--text-primary); margin-bottom:16px;"><i class="fas fa-cog me-2" style="color:var(--accent);"></i>Slots de Componentes</h3>
                <div id="slotsContainer">
                    <p style="color:var(--text-tertiary); font-size:14px;">Selecciona una nave primero para ver los slots.</p>
                </div>
            </div>

            <div class="editor-card">
                <h3 style="font-size:16px; font-weight:700; color:var(--text-primary); margin-bottom:16px;"><i class="fas fa-info-circle me-2" style="color:var(--accent);"></i>Información</h3>
                <div style="margin-bottom:14px;">
                    <label style="display:block; color:var(--text-secondary); font-size:13px; margin-bottom:6px;">Nombre de la Build *</label>
                    <input type="text" id="buildTitle" placeholder="Ej: DPS máximo en Sirius..." style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border-color);background:var(--bg-input);color:var(--text-primary);font-size:14px;">
                </div>
                <div>
                    <label style="display:block; color:var(--text-secondary); font-size:13px; margin-bottom:6px;">Descripción / Guía (opcional)</label>
                    <textarea id="buildDesc" rows="4" placeholder="Explica la estrategia, cómo usar esta build, para qué sirve..." style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border-color);background:var(--bg-input);color:var(--text-primary);font-size:14px;resize:vertical;font-family:inherit;"></textarea>
                </div>
            </div>

            <div id="viewModeActions" style="display:none; margin-bottom:20px;">
                <button id="likeBtn" class="like-btn" onclick="toggleLike()"><i class="fas fa-heart me-2"></i>Me gusta (<span id="likeCount">0</span>)</button>
            </div>

            <div id="saveSection">
                <div id="alertMsg" style="display:none; padding:12px 16px; border-radius:10px; margin-bottom:12px; font-size:14px;"></div>
                <button id="saveBtn" class="btn-save" onclick="saveBuild()">
                    <i class="fas fa-save me-2"></i>Publicar Build
                </button>
            </div>
        </div>
    </main>
    <galaxwiki-footer></galaxwiki-footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-firestore-compat.min.js"></script>
    <script src="../../js/firebase-config.js"></script>
    <script src="../../js/header-auth.js"></script>
    <script src="../../js/gamification.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const buildId = params.get('id');
        let currentUser = null;
        let allComponents = [];
        let selectedShip = null;
        let isViewMode = false;
        let existingBuild = null;

        // ── Auth ───────────────────────────────────────────────────
        auth.onAuthStateChanged(async user => {
            currentUser = user;
            if (buildId) {
                // View or edit existing build
                await loadExistingBuild();
            } else {
                // Create new build
                if (!user) {
                    document.getElementById('editorContent').style.display = 'none';
                    document.getElementById('authGate').style.display = 'block';
                } else {
                    document.getElementById('editorTitle').textContent = 'Crear nueva build';
                    document.getElementById('authGate').style.display = 'none';
                    document.getElementById('editorContent').style.display = 'block';
                    await Promise.all([loadShips(), loadComponents()]);
                }
            }
        });

        // ── Load existing build (view mode) ───────────────────────
        async function loadExistingBuild() {
            try {
                const snap = await db.collection('builds').doc(buildId).get();
                if (!snap.exists) { document.getElementById('editorTitle').textContent = 'Build no encontrada'; return; }
                existingBuild = { id: snap.id, ...snap.data() };
                const isOwner = currentUser && currentUser.uid === existingBuild.authorId;
                isViewMode = !isOwner;

                document.getElementById('editorTitle').textContent = existingBuild.title || 'Build';
                if (isViewMode) {
                    document.getElementById('readOnlyBadge').style.display = 'inline-block';
                    document.getElementById('saveSection').style.display = 'none';
                    document.getElementById('viewModeActions').style.display = 'block';
                    document.getElementById('likeCount').textContent = existingBuild.likes || 0;
                }

                await Promise.all([loadShips(), loadComponents()]);

                // Pre-fill form
                document.getElementById('shipSelect').value = existingBuild.shipId || '';
                document.getElementById('buildTitle').value = existingBuild.title || '';
                document.getElementById('buildDesc').value = existingBuild.description || '';
                if (existingBuild.shipId) await onShipChange(existingBuild.shipId, existingBuild.slots || []);

                if (isViewMode) {
                    document.querySelectorAll('#editorContent input, #editorContent textarea, #editorContent select').forEach(el => el.disabled = true);
                }

                // Increment views
                await db.collection('builds').doc(buildId).update({ views: firebase.firestore.FieldValue.increment(1) }).catch(() => {});
            } catch(e) { console.error(e); }
        }

        // ── Load ships into select ─────────────────────────────────
        async function loadShips() {
            const sel = document.getElementById('shipSelect');
            try {
                const snap = await db.collection('ships').orderBy('name').get();
                snap.forEach(doc => {
                    const opt = document.createElement('option');
                    opt.value = doc.id;
                    opt.dataset.name = doc.data().name || '';
                    opt.dataset.slots = doc.data().componentSlotsMax || 6;
                    opt.dataset.img = doc.data().image || '';
                    opt.dataset.type = doc.data().type || '';
                    opt.textContent = doc.data().name || 'Nave';
                    sel.appendChild(opt);
                });
            } catch(e) { console.warn('Error cargando naves:', e); }
            sel.addEventListener('change', () => onShipChange(sel.value));
        }

        // ── Load components for slot selects ──────────────────────
        async function loadComponents() {
            try {
                const snap = await db.collection('components').orderBy('name').get();
                snap.forEach(doc => allComponents.push({ id: doc.id, ...doc.data() }));
            } catch(e) { console.warn('Error cargando componentes:', e); }
        }

        // ── On ship selected — render slots ───────────────────────
        async function onShipChange(shipId, prefillSlots = []) {
            const sel = document.getElementById('shipSelect');
            const opt = sel.querySelector(`option[value="${shipId}"]`);
            if (!opt || !shipId) { document.getElementById('slotsContainer').innerHTML = '<p style="color:var(--text-tertiary); font-size:14px;">Selecciona una nave primero para ver los slots.</p>'; return; }
            const slotCount = parseInt(opt.dataset.slots) || 6;
            const img = opt.dataset.img;
            const name = opt.dataset.name;

            // Update ship preview
            const preview = document.getElementById('shipPreview');
            preview.innerHTML = `
                ${img ? `<img src="${img}" alt="${name}" loading="lazy">` : '<div class="ship-preview-placeholder"><i class="fas fa-space-shuttle"></i></div>'}
                <div>
                    <div style="font-size:16px;font-weight:700;color:var(--text-primary);">${name}</div>
                    <div style="font-size:13px;color:var(--text-secondary);">${slotCount} ranuras de componentes</div>
                </div>`;

            // Render slot rows
            const slotsContainer = document.getElementById('slotsContainer');
            slotsContainer.innerHTML = '';
            for (let i = 0; i < slotCount; i++) {
                const row = document.createElement('div');
                row.className = 'slot-row';
                const prefill = prefillSlots[i] || null;
                row.innerHTML = `
                    <div class="slot-num">${i + 1}</div>
                    <select class="slot-select" id="slot_${i}" ${isViewMode ? 'disabled' : ''}>
                        <option value="">— Sin componente —</option>
                        ${allComponents.map(c => `<option value="${c.id}" ${prefill && prefill.componentId === c.id ? 'selected' : ''}>${(c.name || c.id).replace(/</g,'&lt;')} ${c.type ? '('+c.type+')' : ''}</option>`).join('')}
                    </select>`;
                slotsContainer.appendChild(row);
            }
            selectedShip = { id: shipId, name, slotCount, img };
        }

        // ── Save build ────────────────────────────────────────────
        async function saveBuild() {
            if (!currentUser) return;
            const title = document.getElementById('buildTitle').value.trim();
            const desc = document.getElementById('buildDesc').value.trim();
            const shipId = document.getElementById('shipSelect').value;
            if (!shipId) { showAlert('Selecciona una nave.', 'error'); return; }
            if (!title) { showAlert('El nombre de la build es obligatorio.', 'error'); return; }

            const slots = [];
            for (let i = 0; i < (selectedShip?.slotCount || 0); i++) {
                const sel = document.getElementById(`slot_${i}`);
                if (!sel) break;
                const compId = sel.value;
                const compName = compId ? (allComponents.find(c => c.id === compId)?.name || compId) : null;
                slots.push(compId ? { componentId: compId, componentName: compName } : null);
            }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Guardando...';

            try {
                let authorName = currentUser.displayName || currentUser.email || 'Piloto';
                try {
                    const ud = await db.collection('users').doc(currentUser.uid).get();
                    if (ud.exists && ud.data().username) authorName = ud.data().username;
                } catch(e) {}

                const data = {
                    shipId,
                    shipName: selectedShip?.name || '',
                    title,
                    description: desc,
                    slots,
                    authorId: currentUser.uid,
                    authorName,
                    likes: 0,
                    views: 0,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                if (buildId && !isViewMode) {
                    await db.collection('builds').doc(buildId).update(data);
                    showAlert('Build actualizada correctamente.', 'success');
                } else {
                    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    const ref = await db.collection('builds').add(data);
                    // Award XP for creating a build
                    if (typeof gwAwardXp === 'function') gwAwardXp('build_create').catch(() => {});
                    showAlert('¡Build publicada! Redirigiendo...', 'success');
                    setTimeout(() => location.href = `build-editor.html?id=${ref.id}`, 1500);
                }
            } catch(e) {
                showAlert('Error al guardar: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save me-2"></i>Publicar Build';
            }
        }

        // ── Like ──────────────────────────────────────────────────
        async function toggleLike() {
            if (!currentUser) { alert('Inicia sesión para dar like.'); return; }
            const likeKey = `gw_like_build_${buildId}_${currentUser.uid}`;
            const already = localStorage.getItem(likeKey);
            const btn = document.getElementById('likeBtn');
            try {
                if (already) {
                    await db.collection('builds').doc(buildId).update({ likes: firebase.firestore.FieldValue.increment(-1) });
                    localStorage.removeItem(likeKey);
                    btn.classList.remove('liked');
                } else {
                    await db.collection('builds').doc(buildId).update({ likes: firebase.firestore.FieldValue.increment(1) });
                    localStorage.setItem(likeKey, '1');
                    btn.classList.add('liked');
                    if (typeof gwAwardXp === 'function') gwAwardXp('build_like').catch(() => {});
                }
                const newLikes = parseInt(document.getElementById('likeCount').textContent) + (already ? -1 : 1);
                document.getElementById('likeCount').textContent = newLikes;
            } catch(e) { alert('Error: ' + e.message); }
        }

        function showAlert(msg, type) {
            const el = document.getElementById('alertMsg');
            el.textContent = msg;
            el.style.display = 'block';
            el.style.background = type === 'success' ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)';
            el.style.border = type === 'success' ? '1px solid rgba(34,197,94,0.3)' : '1px solid rgba(239,68,68,0.3)';
            el.style.color = type === 'success' ? '#86efac' : '#f87171';
        }
    </script>
</body>
</html>
