<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaxWiki - Noticias</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../css/styles.css" rel="stylesheet">
    <script src="../js/components/footer-component.js"></script>
    <style>
        /* ── Grid de noticias ─────────────────────────────────── */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 22px;
            margin-top: 8px;
        }

        /* ── Tarjeta principal (destacada) ─────────────────────── */
        .news-featured {
            grid-column: 1 / -1;
        }

        /* ── Tarjeta de noticia ────────────────────────────────── */
        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: all 0.25s ease;
            position: relative;
        }
        .news-card:hover {
            border-color: rgba(102,126,234,0.5);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(102,126,234,0.15);
            color: inherit;
        }
        .news-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(102,126,234,0.03), transparent);
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }
        .news-card:hover::before { opacity: 1; }

        /* ── Imagen de portada ─────────────────────────────────── */
        .news-card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }
        .news-card.featured .news-card-img { height: 260px; }

        /* Placeholder si no hay imagen */
        .news-card-img-placeholder {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, rgba(102,126,234,0.12), rgba(118,75,162,0.08));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            opacity: 0.5;
        }

        /* ── Contenido de la tarjeta ───────────────────────────── */
        .news-card-body {
            padding: 18px 20px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .news-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #a78bfa;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .news-card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 10px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-card.featured .news-card-title { font-size: 20px; -webkit-line-clamp: 3; }

        .news-card-excerpt {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .news-card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-tertiary);
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            margin-top: auto;
        }
        .news-card-author { display: flex; align-items: center; gap: 6px; }
        .news-card-author i { color: var(--accent); font-size: 11px; }
        .news-read-more {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--accent);
            font-weight: 600;
            font-size: 12px;
            opacity: 0;
            transform: translateX(-4px);
            transition: all 0.2s;
        }
        .news-card:hover .news-read-more {
            opacity: 1;
            transform: translateX(0);
        }

        /* ── Skeleton loader ───────────────────────────────────── */
        .news-skeleton {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            overflow: hidden;
            animation: skelePulse 1.6s ease-in-out infinite;
        }
        @keyframes skelePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .skel-img { height: 160px; background: var(--border-color); }
        .skel-body { padding: 18px; }
        .skel-line {
            height: 12px; border-radius: 6px;
            background: var(--border-color); margin-bottom: 10px;
        }
        .skel-line.short { width: 40%; }
        .skel-line.medium { width: 70%; }
        .skel-line.full { width: 100%; }

        /* ── Estado vacío ──────────────────────────────────────── */
        .news-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 24px;
            color: var(--text-secondary);
        }
        .news-empty i { font-size: 52px; color: var(--accent); opacity: 0.4; margin-bottom: 16px; }
        .news-empty h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .news-empty p { font-size: 14px; opacity: 0.7; }

        /* ── Error ─────────────────────────────────────────────── */
        .news-error {
            grid-column: 1 / -1;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            color: #fca5a5;
        }
        .news-error button {
            margin-top: 12px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 8px;
            color: #fca5a5;
            padding: 7px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .news-error button:hover { background: rgba(239,68,68,0.25); }

        /* ── Responsive ────────────────────────────────────────── */
        @media (max-width: 600px) {
            .news-grid { grid-template-columns: 1fr; gap: 16px; }
        }
    </style>
</head>

            <!-- Skeletons de carga -->

                <div class="skel-img"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>

    <script>
    (function() {
        const db = window.db;
        const grid = document.getElementById('newsGrid');
        if (!db || !grid) return;

        let newsCache = [];
        let lastLoadTime = 0;
        const CACHE_DURATION = 5 * 60 * 1000;

        // ── Formato de fecha relativa ────────────────────────
        function relativeDate(ts) {
            if (!ts) return '';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            const diff = Math.floor((Date.now() - d.getTime()) / 1000);
            if (diff < 60)     return 'hace unos segundos';
            if (diff < 3600)   return 'hace ' + Math.floor(diff/60) + ' min';
            if (diff < 86400)  return 'hace ' + Math.floor(diff/3600) + ' h';
            if (diff < 604800) return 'hace ' + Math.floor(diff/86400) + ' días';
            return d.toLocaleDateString('es', { day:'2-digit', month:'short', year:'numeric' });
        }

        // ── Renderizar tarjeta de noticia ────────────────────
        function renderCard(n, isFeatured) {
            const dateStr = relativeDate(n.createdAt);
            const excerpt = (n.excerpt || n.content || '').replace(/<[^>]*>/g, '').substring(0, 200);
            const featuredClass = isFeatured ? ' featured news-featured' : '';

            let imgHtml = '';
            if (n.image) {
                imgHtml = `<img src="${n.image}" alt="${n.title}" class="news-card-img" loading="lazy" onerror="this.parentElement.querySelector('.news-card-img-placeholder')&&(this.style.display='none',this.nextElementSibling.style.display='flex');this.style.display='none';">
                           <div class="news-card-img-placeholder" style="display:none;"><i class="fas fa-newspaper"></i></div>`;
            } else {
                imgHtml = `<div class="news-card-img-placeholder"><i class="fas fa-newspaper"></i></div>`;
            }

            return `
            <a href="news-detail.html?id=${encodeURIComponent(n.id)}" class="news-card${featuredClass}">
                ${imgHtml}
                <div class="news-card-body">
                    <div class="news-tag"><i class="fas fa-satellite-dish"></i> Noticia</div>
                    <h2 class="news-card-title">${n.title}</h2>
                    ${excerpt ? `<p class="news-card-excerpt">${excerpt}${excerpt.length >= 200 ? '…' : ''}</p>` : ''}
                    <div class="news-card-meta">
                        <div class="news-card-author">
                            <i class="fas fa-user-astronaut"></i>
                            <span>${n.authorName || 'GalaxWiki'}</span>
                            ${dateStr ? `<span style="opacity:0.5">· ${dateStr}</span>` : ''}
                        </div>
                        <div class="news-read-more">
                            Leer <i class="fas fa-arrow-right" style="font-size:10px;"></i>
                        </div>
                    </div>
                </div>
            </a>`;
        }

        // ── Renderizar lista ─────────────────────────────────
        function renderNews(list) {
            if (list.length === 0) {
                grid.innerHTML = `
                    <div class="news-empty">
                        <i class="fas fa-newspaper"></i>
                        <h3>No hay noticias aún</h3>
                        <p>Las noticias publicadas aparecerán aquí.</p>
                    </div>`;
                return;
            }
            grid.innerHTML = list.map((n, i) => renderCard(n, i === 0)).join('');
        }

        // ── Cargar noticias ──────────────────────────────────
        async function loadNews(forceRefresh) {
            const now = Date.now();
            if (!forceRefresh && newsCache.length > 0 && (now - lastLoadTime) < CACHE_DURATION) {
                renderNews(newsCache);
                return;
            }

            try {
                const snap = await db.collection('news')
                    .orderBy('createdAt', 'desc')
                    .limit(30)
                    .get();

                newsCache = [];
                snap.forEach(function(doc) {
                    const d = doc.data();
                    if (d.published !== false) {
                        newsCache.push({
                            id: doc.id,
                            title: d.title || 'Sin título',
                            excerpt: d.excerpt,
                            content: d.content,
                            image: d.image,
                            authorName: d.authorName,
                            createdAt: d.createdAt,
                        });
                    }
                });

                lastLoadTime = now;
                renderNews(newsCache);

            } catch(e) {
                console.error('Error cargando noticias:', e);
                grid.innerHTML = `
                    <div class="news-error">
                        <i class="fas fa-exclamation-triangle" style="font-size:28px;margin-bottom:8px;display:block;"></i>
                        <strong>Error al cargar las noticias</strong>
                        <p style="font-size:13px;margin:6px 0 0;opacity:0.8;">${e.message}</p>
                        <button onclick="loadNews(true)"><i class="fas fa-redo me-1"></i> Reintentar</button>
                    </div>`;
            }
        }

        // Exponer para el botón de reintentar
        window.loadNews = loadNews;

        // Auto-refresh
        setInterval(function() { loadNews(true); }, CACHE_DURATION);

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() { loadNews(); });
        } else {
            loadNews();
        }
    })();
    </script>
