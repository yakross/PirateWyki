<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaxWiki - Iniciar Sesión</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="stars" id="stars"></div>

    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i>
        Volver al inicio
    </a>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fas fa-rocket"></i>
                </div>
                <h1 class="logo-text">GalaxWiki</h1>
                <p class="logo-subtitle">PIRATE GALAXY</p>
            </div>

            <div class="alert alert-error" id="errorAlert"></div>
            <div class="alert alert-success" id="successAlert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Correo electrónico</label>
                    <div class="input-group-custom">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-control" id="email" placeholder="tu@email.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group-custom">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt me-2"></i>Iniciar sesión
                </button>

                <div class="auth-footer">
                    ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-firestore-compat.min.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        const auth = window.auth;

        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
            setTimeout(() => { errorAlert.style.display = 'none'; }, 5000);
        }

        function showSuccess(message) {
            const successAlert = document.getElementById('successAlert');
            successAlert.textContent = message;
            successAlert.style.display = 'block';
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('loginBtn');
            btn.disabled = isLoading;
            btn.innerHTML = isLoading ? '<span class="loading-spinner"></span> Entrando...' : '<i class="fas fa-sign-in-alt me-2"></i>Iniciar sesión';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            setLoading(true);
            try {
                await auth.signInWithEmailAndPassword(email, password);
                showSuccess('¡Bienvenido! Redirigiendo...');
                setTimeout(() => { window.location.href = 'index.html'; }, 600);
            } catch (error) {
                setLoading(false);
                const messages = {
                    'auth/user-not-found': 'No existe una cuenta con este correo',
                    'auth/wrong-password': 'Contraseña incorrecta',
                    'auth/invalid-email': 'Correo electrónico inválido',
                    'auth/user-disabled': 'Esta cuenta ha sido deshabilitada',
                    'auth/too-many-requests': 'Demasiados intentos. Intenta más tarde'
                };
                showError(messages[error.code] || error.message);
            }
        });

        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
