<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaxWiki - Iniciar Sesión</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <style>
        /* ── Fondo animado de partículas ─────────────────────── */
        .auth-page { position: relative; min-height: 100vh; overflow-x: hidden; overflow-y: auto; }
        .nebula-bg {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(102,126,234,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(118,75,162,0.10) 0%, transparent 55%),
                        radial-gradient(ellipse at 60% 80%, rgba(59,130,246,0.08) 0%, transparent 50%),
                        #0a0b14;
            animation: nebulaPulse 12s ease-in-out infinite alternate;
        }
        @keyframes nebulaPulse {
            0%   { filter: hue-rotate(0deg) brightness(1); }
            100% { filter: hue-rotate(15deg) brightness(1.08); }
        }

        /* ── Estrellitas ──────────────────────────────────────── */
        .star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--dur, 3s) ease-in-out infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.1; transform: scale(1); } 100% { opacity: 0.9; transform: scale(1.4); } }

        /* ── Layout ───────────────────────────────────────────── */
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            color: var(--text-secondary); text-decoration: none; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border-color);
            padding: 8px 14px; border-radius: 30px; backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .back-link:hover { color: var(--accent); border-color: var(--accent); transform: translateX(-2px); }

        .login-container {
            position: relative; z-index: 10;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 60px 20px 40px;
        }

        .login-card {
            width: 100%; max-width: 460px;
            background: rgba(16,17,30,0.85);
            border: 1px solid rgba(102,126,234,0.25);
            border-radius: 24px;
            padding: 40px 38px 36px;
            backdrop-filter: blur(24px);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 32px 80px rgba(0,0,0,0.5), 0 0 60px rgba(102,126,234,0.08);
            animation: cardIn 0.5s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes cardIn { from { opacity:0; transform: translateY(24px) scale(0.97); } to { opacity:1; transform:none; } }

        /* ── Logo ─────────────────────────────────────────────── */
        .logo-container { text-align: center; margin-bottom: 28px; }
        .logo-icon {
            width: 64px; height: 64px; border-radius: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; color: white; margin: 0 auto 14px;
            box-shadow: 0 8px 24px rgba(102,126,234,0.35);
            animation: floatIcon 4s ease-in-out infinite;
        }
        @keyframes floatIcon { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .logo-text { font-size: 22px; font-weight: 700; color: var(--text-primary); margin: 0 0 4px; }
        .logo-subtitle { font-size: 11px; letter-spacing: 3px; color: var(--accent); opacity: 0.7; text-transform: uppercase; margin: 0; }

        /* ── Alertas ──────────────────────────────────────────── */
        .alert { border-radius: 12px; padding: 12px 16px; font-size: 14px; margin-bottom: 16px; display: none; }
        .alert-error   { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }

        /* ── Google btn ───────────────────────────────────────── */
        .btn-google {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px; color: var(--text-primary);
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; margin-bottom: 4px;
        }
        .btn-google:hover { background: rgba(66,133,244,0.1); border-color: rgba(66,133,244,0.4); transform: translateY(-1px); }
        .btn-google:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
        .google-svg { width: 18px; height: 18px; flex-shrink: 0; }

        /* ── Divider ──────────────────────────────────────────── */
        .divider-or {
            display: flex; align-items: center; gap: 12px;
            margin: 18px 0; color: var(--text-tertiary); font-size: 12px;
        }
        .divider-or::before, .divider-or::after { content:''; flex:1; height:1px; background: rgba(255,255,255,0.08); }

        /* ── Form ─────────────────────────────────────────────── */
        .form-group { margin-bottom: 14px; }
        .form-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; display: block; }
        .input-group-custom { position: relative; }
        .input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-tertiary); font-size: 14px; pointer-events: none; z-index: 1;
        }
        .form-control {
            width: 100%; padding: 11px 14px 11px 40px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: var(--text-primary); font-size: 14px;
            transition: all 0.2s; outline: none;
        }
        .form-control:focus { border-color: var(--accent); background: rgba(102,126,234,0.06); box-shadow: 0 0 0 3px rgba(102,126,234,0.12); }
        .form-control::placeholder { color: var(--text-tertiary); }

        .forgot-link {
            display: block; text-align: right;
            font-size: 12px; color: var(--accent);
            text-decoration: none; margin-top: 6px;
        }
        .forgot-link:hover { text-decoration: underline; }

        /* ── Submit btn ───────────────────────────────────────── */
        .btn-login-submit {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 13px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 12px; color: white;
            font-size: 15px; font-weight: 700; cursor: pointer;
            transition: all 0.2s; margin-top: 16px;
            box-shadow: 0 4px 20px rgba(102,126,234,0.3);
        }
        .btn-login-submit:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(102,126,234,0.4); }
        .btn-login-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .auth-footer { text-align: center; margin-top: 18px; font-size: 13px; color: var(--text-tertiary); }
        .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body class="auth-page">
    <div class="nebula-bg"></div>
    <div class="stars" id="stars"></div>
    <a href="index.html" class="back-link" data-i18n="auth.back_home"><i class="fas fa-arrow-left"></i> Volver al inicio</a>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <div class="logo-icon"><i class="fas fa-rocket"></i></div>
                <h1 class="logo-text">GalaxWiki</h1>
                <p class="logo-subtitle">PIRATE GALAXY</p>
            </div>

            <div class="alert alert-error"   id="errorAlert"></div>
            <div class="alert alert-success"  id="successAlert"></div>

            <!-- Google -->
            <button type="button" class="btn-google" id="btnGoogle" onclick="loginWithGoogle()">
                <svg class="google-svg" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span data-i18n="auth.google">Continuar con Google</span>
            </button>

            <div class="divider-or" data-i18n="auth.or_email">o usa tu correo</div>

            <!-- Email / contraseña -->
            <form id="loginForm" onsubmit="loginWithEmail(event)">
                <div class="form-group">
                    <label class="form-label" data-i18n="auth.email">Correo electrónico</label>
                    <div class="input-group-custom">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-control" id="email" placeholder="tu@email.com" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 10px;">
                    <label class="form-label" data-i18n="auth.password">Contraseña</label>
                    <div class="input-group-custom">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="password" placeholder="Tu contraseña" required autocomplete="current-password">
                    </div>
                    <a href="#" class="forgot-link" onclick="resetPassword(event)" data-i18n="auth.forgot_pw">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="btn-login-submit" id="loginBtn" data-i18n="auth.login">
                    <i class="fas fa-sign-in-alt"></i> Iniciar sesión
                </button>
                <div class="auth-footer">
                    <span data-i18n="auth.no_account">¿No tienes cuenta?</span> <a href="register.html" data-i18n="auth.sign_up_here">Regístrate aquí</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-firestore-compat.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/i18n.js"></script>
    <script>
    'use strict';
    const auth = window.auth;
    const db   = window.db;

    // ── Estrellas ──────────────────────────────────────────────
    (function() {
        const el = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2 + 1;
            s.style.width = `${size}px`;
            s.style.height = `${size}px`;
            s.style.left = `${Math.random() * 100}%`;
            s.style.top = `${Math.random() * 100}%`;
            s.style.setProperty('--dur', `${Math.random() * 3 + 2}s`);
            s.style.animationDelay = `${Math.random() * 5}s`;
            el.appendChild(s);
        }
    })();

    function showError(msg) {
        const el = document.getElementById('errorAlert');
        el.textContent = msg; el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 6000);
    }
    function showSuccess(msg) {
        const el = document.getElementById('successAlert');
        el.textContent = msg; el.style.display = 'block';
    }

    // Asegurar que el documento del usuario exista en Firestore
    async function ensureUserDoc(user, extra) {
        extra = extra || {};
        const ref  = db.collection('users').doc(user.uid);
        const snap = await ref.get();
        
        if (snap.exists && snap.data().username) {
            const d = snap.data();
            if (!d.avatar && user.photoURL) {
                await ref.update({ avatar: user.photoURL });
            }
            return;
        }

        const dataToSet = {
            uid:          user.uid,
            email:        user.email || '',
            username:     extra.username || user.displayName || (user.email ? user.email.split('@')[0] : 'Piloto'),
            fleet:        extra.fleet  || '',
            avatar:       user.photoURL || '',
            role:         'user',
            postCount:    0,
            xp:           0,
            profileFrame: 'none'
        };

        if (!snap.exists || !snap.data().createdAt) {
            dataToSet.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        }

        await ref.set(dataToSet, { merge: true });
    }

    // Login con Google
    async function loginWithGoogle() {
        const btn = document.getElementById('btnGoogle');
        btn.disabled = true;
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        try {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            const result = await auth.signInWithPopup(provider);
            await ensureUserDoc(result.user, {});
            showSuccess('¡Bienvenido! Redirigiendo...');
            setTimeout(() => { window.location.href = 'index.html'; }, 600);
        } catch(e) {
            btn.disabled = false;
            btn.innerHTML = originalHtml;
            if (e.code !== 'auth/popup-closed-by-user') showError('Error con Google: ' + e.message);
        }
    }

    // Login con email
    async function loginWithEmail(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        try {
            await auth.signInWithEmailAndPassword(
                document.getElementById('email').value,
                document.getElementById('password').value
            );
            showSuccess('¡Bienvenido! Redirigiendo...');
            setTimeout(() => { window.location.href = 'index.html'; }, 600);
        } catch(err) {
            btn.disabled = false;
            btn.innerHTML = originalHtml;
            const msgs = {
                'auth/user-not-found':    'No existe una cuenta con este correo.',
                'auth/wrong-password':    'Contraseña incorrecta.',
                'auth/invalid-email':     'Correo electrónico inválido.',
                'auth/user-disabled':     'Esta cuenta ha sido deshabilitada.',
                'auth/too-many-requests': 'Demasiados intentos. Intenta más tarde.',
                'auth/invalid-credential':'Correo o contraseña incorrectos.',
            };
            showError(msgs[err.code] || err.message);
        }
    }

    // Recuperar contraseña
    async function resetPassword(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        if (!email) { showError('Escribe tu correo arriba primero.'); return; }
        try {
            await auth.sendPasswordResetEmail(email);
            showSuccess('Correo de recuperación enviado a ' + email);
        } catch(err) { showError('Error: ' + err.message); }
    }

    // Redirigir si ya está logueado
    auth.onAuthStateChanged(user => { if (user) window.location.href = 'index.html'; });
    </script>
</body>
</html>
